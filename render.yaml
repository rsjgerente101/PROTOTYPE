services:
  - type: web
    name: thesis-backend
    env: python
    buildCommand: bash backend/render-build.sh
    branch: main
    plan: starter
    regions:
      - oregon
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: "INFO"
      - key: FRONTEND_URL
        value: "https://your-frontend.example"
